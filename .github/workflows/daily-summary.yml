name: Daily AI Newsletter Summary

on:
  schedule:
    # UTC 23:00 = 北京时间早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read
  actions: write  # 允许删除 artifacts

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install follow-builders skill
        timeout-minutes: 5
        run: |
          mkdir -p ~/.claude/skills
          git clone https://github.com/zarazhangrui/follow-builders.git ~/.claude/skills/follow-builders
          cd ~/.claude/skills/follow-builders/scripts && npm install

      - name: Merge custom follow-builders sources
        run: |
          python -c "
          import json
          from pathlib import Path

          # 读取默认配置
          default_path = Path.home() / '.claude/skills/follow-builders/config/default-sources.json'
          with open(default_path) as f:
              config = json.load(f)

          # 读取自定义配置
          custom_path = 'config/follow-builders-sources.json'
          with open(custom_path) as f:
              custom = json.load(f)

          # 合并 X accounts
          existing_handles = {a['handle'].lower() for a in config.get('x_accounts', [])}
          for account in custom.get('x_accounts', []):
              if account['handle'].lower() not in existing_handles:
                  config['x_accounts'].append(account)
                  print(f\"Added X account: {account['name']} (@{account['handle']})\")

          # 合并 podcasts
          existing_names = {p['name'].lower() for p in config.get('podcasts', [])}
          for podcast in custom.get('podcasts', []):
              if podcast['name'].lower() not in existing_names:
                  config['podcasts'].append(podcast)
                  print(f\"Added podcast: {podcast['name']}\")

          # 保存合并后的配置
          with open(default_path, 'w') as f:
              json.dump(config, f, indent=2)

          print(f\"Total: {len(config['x_accounts'])} X accounts, {len(config['podcasts'])} podcasts\")
          "

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get current date (Beijing time)
        id: date
        run: echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run newsletter summary
        timeout-minutes: 80
        env:
          # 邮箱配置
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          # SMTP 配置（用于邮件推送）
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          # AI API 配置
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          # 微信公众号配置（可选）
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          # 图片生成配置（可选）
          IMAGE_API_KEY: ${{ secrets.IMAGE_API_KEY }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
          IMAGE_MODEL: ${{ secrets.IMAGE_MODEL }}
          # 向后兼容（旧 Secrets 名称）
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: python -m src.main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-summary-${{ steps.date.outputs.date }}
          path: output/*
          retention-days: 30

  # 清理超过 30 天的旧 artifacts
  cleanup:
    needs: summary
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const retentionDays = 30;
            const cutoffDate = new Date(Date.now() - retentionDays * 24 * 60 * 60 * 1000);

            // 获取所有 artifacts
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // 删除超过保留期的 artifacts
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.startsWith('newsletter-summary-')) {
                const createdAt = new Date(artifact.created_at);
                if (createdAt < cutoffDate) {
                  console.log(`Deleting old artifact: ${artifact.name} (created: ${artifact.created_at})`);
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                }
              }
            }